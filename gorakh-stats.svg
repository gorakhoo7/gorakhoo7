<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200" role="img" aria-label="Gorakh's GitHub stats">
<defs>
<style><![CDATA[
text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
.mono{font-family:'SFMono-Regular',Consolas,monospace}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ring{from{stroke-dashoffset:251}to{stroke-dashoffset:63}}
.fade{opacity:0;animation:fadeIn .7s ease forwards}
]]></style>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
</defs>
<rect width="480" height="200" rx="14" fill="#0b1830" stroke="#1f3a5c"/>
<text x="26" y="38" font-size="17" font-weight="700" fill="#38bdf8" class="fade">Gorakh's GitHub Stats</text>
<g class="mono" font-size="14.5">
  <text x="26" y="76" fill="#8fb3d9" class="fade" style="animation-delay:.2s">⚡ Contributions (year)</text><text x="300" y="76" fill="#e6f1ff" font-weight="700" class="fade" style="animation-delay:.35s">1,977</text>
  <text x="26" y="104" fill="#8fb3d9" class="fade" style="animation-delay:.4s">🔨 Commits</text><text x="300" y="104" fill="#e6f1ff" font-weight="700" class="fade" style="animation-delay:.55s">1,365</text>
  <text x="26" y="132" fill="#8fb3d9" class="fade" style="animation-delay:.6s">🔀 Pull requests</text><text x="300" y="132" fill="#e6f1ff" font-weight="700" class="fade" style="animation-delay:.75s">351</text>
  <text x="26" y="160" fill="#8fb3d9" class="fade" style="animation-delay:.8s">👀 Code reviews</text><text x="300" y="160" fill="#e6f1ff" font-weight="700" class="fade" style="animation-delay:.95s">255</text>
</g>
<g transform="translate(400,108)">
  <circle r="40" fill="none" stroke="#132542" stroke-width="9"/>
  <circle r="40" fill="none" stroke="url(#g)" stroke-width="9" stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251" transform="rotate(-90)" style="animation:ring 1.6s cubic-bezier(.4,0,.2,1) forwards .4s"/>
  <text y="9" text-anchor="middle" font-size="26" font-weight="800" fill="#e6f1ff" class="fade" style="animation-delay:1.2s">S+</text>
</g>
<text x="26" y="186" class="mono fade" font-size="11" fill="#33507a" style="animation-delay:1.1s">most of the action happens in private org repos 🔒</text>
</svg>
