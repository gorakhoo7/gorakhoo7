<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gorakh — Payments and Platform Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="55%" stop-color="#0b1830"/>
      <stop offset="100%" stop-color="#071a1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity=".65"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="260" rx="16" fill="url(#bg)"/>

  <!-- grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity=".28">
    <path d="M0 65H1200M0 130H1200M0 195H1200"/>
    <path d="M150 0V260M300 0V260M450 0V260M600 0V260M750 0V260M900 0V260M1050 0V260"/>
  </g>

  <!-- transaction pulse traveling the rail -->
  <path id="rail" d="M40 208 H360 L400 168 H700 L740 208 H1160" fill="none" stroke="#1e3a5f" stroke-width="2"/>
  <circle r="5" fill="#34d399" filter="url(#glow)">
    <animateMotion dur="5s" repeatCount="indefinite" rotate="none">
      <mpath href="#rail"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#38bdf8" filter="url(#glow)">
    <animateMotion dur="5s" begin="2.2s" repeatCount="indefinite" rotate="none">
      <mpath href="#rail"/>
    </animateMotion>
  </circle>

  <!-- name -->
  <text x="60" y="112" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#e6f1ff" letter-spacing="1">Hi, I'm Gorakh</text>
  <rect x="62" y="128" width="330" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- typed subtitle -->
  <text x="62" y="168" font-family="SFMono-Regular, Consolas, monospace" font-size="21" fill="#8fb3d9">
    <tspan fill="#34d399">$</tspan>
    <tspan> I build payment rails &#38; the automation around them</tspan>
  </text>
  <rect x="62" y="152" width="620" height="22" fill="#0b1830">
    <animate attributeName="width" from="620" to="0" dur="2.8s" begin="0.4s" fill="freeze"/>
  </rect>
  <rect x="686" y="150" width="11" height="24" fill="#34d399">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" begin="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- scanline sweep -->
  <rect x="0" y="0" width="220" height="260" fill="url(#scan)" opacity=".18">
    <animate attributeName="x" from="-220" to="1200" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- badges -->
  <g font-family="SFMono-Regular, Consolas, monospace" font-size="13" text-anchor="middle">
    <g>
      <rect x="880" y="60" width="120" height="30" rx="15" fill="#0f2a46" stroke="#38bdf8" stroke-opacity=".5"/>
      <text x="940" y="80" fill="#7dd3fc">serverless</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="4s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="1015" y="100" width="120" height="30" rx="15" fill="#0d2b25" stroke="#34d399" stroke-opacity=".5"/>
      <text x="1075" y="120" fill="#6ee7b7">payments</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="900" y="140" width="130 " height="30" rx="15" fill="#241a3a" stroke="#a78bfa" stroke-opacity=".5"/>
      <text x="965" y="160" fill="#c4b5fd">typescript</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
