<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Gorakh — Payments and Platform Engineer">
<title>Gorakh — Payments &amp; Platform Engineer</title>
<defs>
<style type="text/css"><![CDATA[
text{font-family:'SFMono-Regular',Consolas,Menlo,monospace}
.sans{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:translateY(14px) scale(.7)}70%{opacity:1;transform:translateY(-3px) scale(1.05)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes neon{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.4}94%{opacity:1}96%{opacity:.5}97%{opacity:1}}
@keyframes steam{0%{transform:translateY(0);opacity:0}25%{opacity:.55}100%{transform:translateY(-26px);opacity:0}}
@keyframes typeLine{from{width:0}to{width:100%}}
@keyframes dash{to{stroke-dashoffset:-40}}
.pop{opacity:0;animation:popIn .6s cubic-bezier(.2,.8,.3,1.2) forwards}
.fade{opacity:0;animation:fadeIn .8s ease forwards}
.line{overflow:hidden}
]]></style>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#070d1c"/><stop offset="50%" stop-color="#0a1730"/><stop offset="100%" stop-color="#061a1e"/>
</linearGradient>
<linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#38bdf8"/><stop offset="50%" stop-color="#34d399"/><stop offset="100%" stop-color="#a78bfa"/>
</linearGradient>
<linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#101d36"/><stop offset="100%" stop-color="#0b1426"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="neonGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect width="1280" height="640" rx="20" fill="url(#bg)"/>
<g stroke="#16declared" opacity="0"></g>
<g stroke="#1b3357" stroke-width="1" opacity=".25">
  <path d="M0 110H1280M0 220H1280M0 330H1280M0 440H1280M0 550H1280"/>
  <path d="M160 0V640M320 0V640M480 0V640M640 0V640M800 0V640M960 0V640M1120 0V640"/>
</g>

<!-- stars -->
<g fill="#7dd3fc">
  <circle cx="90" cy="70" r="2"><animate attributeName="opacity" values="1;.2;1" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="1210" cy="90" r="2.5" fill="#34d399"><animate attributeName="opacity" values=".3;1;.3" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="640" cy="48" r="1.8" fill="#a78bfa"><animate attributeName="opacity" values="1;.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="580" r="2" ><animate attributeName="opacity" values=".4;1;.4" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="590" r="2" fill="#34d399"><animate attributeName="opacity" values="1;.3;1" dur="4.4s" repeatCount="indefinite"/></circle>
</g>

<!-- ══ LEFT: identity ══ -->
<text x="70" y="150" class="sans fade" font-size="30" fill="#8fb3d9" style="animation-delay:.2s">Hi, I&#8217;m</text>
<text x="66" y="238" class="sans fade" font-size="92" font-weight="800" fill="url(#grad)" filter="url(#glow)" style="animation-delay:.5s">Gorakh</text>
<rect x="70" y="262" width="0" height="6" rx="3" fill="url(#grad)"><animate attributeName="width" from="0" to="380" dur="1s" begin=".9s" fill="freeze"/></rect>

<text x="70" y="316" font-size="24" fill="#c7ddf4" class="fade" style="animation-delay:1.2s">&#128179; Payments &amp; Platform Engineer</text>

<!-- terminal card -->
<g class="fade" style="animation-delay:1.6s">
  <rect x="70" y="348" width="470" height="118" rx="12" fill="url(#card)" stroke="#1f3a5c"/>
  <circle cx="94" cy="372" r="5" fill="#ff5f57"/><circle cx="112" cy="372" r="5" fill="#febc2e"/><circle cx="130" cy="372" r="5" fill="#28c840"/>
  <text x="92" y="408" font-size="16"><tspan fill="#34d399">$</tspan><tspan fill="#c7ddf4"> ship --stage prod --verify</tspan></text>
  <text x="92" y="438" font-size="16" fill="#8fb3d9" class="fade" style="animation-delay:2.4s">&#10003; deployed · merged &#8800; deployed, always check</text>
  <rect x="418" y="426" width="10" height="18" fill="#34d399" style="animation:blink 1.1s step-end infinite"/>
</g>

<!-- tech chips -->
<g font-size="15" text-anchor="middle">
  <g class="pop" style="animation-delay:2.0s"><rect x="70" y="496" width="118" height="34" rx="17" fill="#0f2a46" stroke="#38bdf8" stroke-opacity=".55"/><text x="129" y="518" fill="#7dd3fc">TypeScript</text></g>
  <g class="pop" style="animation-delay:2.15s"><rect x="200" y="496" width="86" height="34" rx="17" fill="#0d2b25" stroke="#34d399" stroke-opacity=".55"/><text x="243" y="518" fill="#6ee7b7">AWS</text></g>
  <g class="pop" style="animation-delay:2.3s"><rect x="298" y="496" width="124" height="34" rx="17" fill="#241a3a" stroke="#a78bfa" stroke-opacity=".55"/><text x="360" y="518" fill="#c4b5fd">Serverless</text></g>
  <g class="pop" style="animation-delay:2.45s"><rect x="434" y="496" width="96" height="34" rx="17" fill="#2b1a2e" stroke="#f472b6" stroke-opacity=".55"/><text x="482" y="518" fill="#f9a8d4">Stripe</text></g>
  <g class="pop" style="animation-delay:2.6s"><rect x="70" y="540" width="96" height="34" rx="17" fill="#102a3a" stroke="#22d3ee" stroke-opacity=".55"/><text x="118" y="562" fill="#67e8f9">React</text></g>
  <g class="pop" style="animation-delay:2.75s"><rect x="178" y="540" width="126" height="34" rx="17" fill="#0d2b25" stroke="#34d399" stroke-opacity=".55"/><text x="241" y="562" fill="#6ee7b7">DynamoDB</text></g>
  <g class="pop" style="animation-delay:2.9s"><rect x="316" y="540" width="98" height="34" rx="17" fill="#1c2a15" stroke="#a3e635" stroke-opacity=".55"/><text x="365" y="562" fill="#bef264">Node.js</text></g>
</g>

<!-- ══ RIGHT: editor + desk scene ══ -->
<g style="animation:floaty 6s ease-in-out infinite">
  <!-- neon sign -->
  <g filter="url(#neonGlow)" style="animation:neon 6s linear infinite">
    <rect x="860" y="62" width="330" height="58" rx="29" fill="none" stroke="#f472b6" stroke-width="2.5"/>
    <text x="1025" y="100" text-anchor="middle" font-size="26" font-weight="700" fill="#f9a8d4" letter-spacing="6">KEEP SHIPPING</text>
  </g>

  <!-- editor window -->
  <g class="fade" style="animation-delay:.6s">
    <rect x="700" y="150" width="500" height="330" rx="14" fill="url(#card)" stroke="#1f3a5c" stroke-width="1.5"/>
    <rect x="700" y="150" width="500" height="42" rx="14" fill="#0c1a30"/>
    <rect x="700" y="178" width="500" height="14" fill="#0c1a30"/>
    <circle cx="726" cy="171" r="6" fill="#ff5f57"/><circle cx="748" cy="171" r="6" fill="#febc2e"/><circle cx="770" cy="171" r="6" fill="#28c840"/>
    <rect x="800" y="158" width="180" height="26" rx="6" fill="#132542"/>
    <text x="815" y="176" font-size="13" fill="#7dd3fc">createSubscription.ts</text>

    <!-- code -->
    <g font-size="15.5">
      <g class="line"><text x="726" y="226" class="fade" style="animation-delay:1.0s"><tspan fill="#c084fc">export async function</tspan><tspan fill="#7dd3fc"> goLive</tspan><tspan fill="#c7ddf4">(tenant: </tspan><tspan fill="#34d399">Tenant</tspan><tspan fill="#c7ddf4">) {</tspan></text></g>
      <text x="748" y="254" class="fade" style="animation-delay:1.4s"><tspan fill="#8fb3d9">// no charge until the customer is truly live</tspan></text>
      <text x="748" y="282" class="fade" style="animation-delay:1.8s"><tspan fill="#c084fc">const</tspan><tspan fill="#c7ddf4"> sub = </tspan><tspan fill="#c084fc">await</tspan><tspan fill="#7dd3fc"> stripe</tspan><tspan fill="#c7ddf4">.subscriptions.</tspan><tspan fill="#fbbf24">create</tspan><tspan fill="#c7ddf4">({</tspan></text>
      <text x="770" y="310" class="fade" style="animation-delay:2.2s"><tspan fill="#67e8f9">customer</tspan><tspan fill="#c7ddf4">: tenant.stripeId,</tspan></text>
      <text x="770" y="338" class="fade" style="animation-delay:2.6s"><tspan fill="#67e8f9">items</tspan><tspan fill="#c7ddf4">: pricesFor(tenant.tier),</tspan></text>
      <text x="748" y="366" class="fade" style="animation-delay:3.0s"><tspan fill="#c7ddf4">});</tspan></text>
      <text x="748" y="394" class="fade" style="animation-delay:3.4s"><tspan fill="#c084fc">return</tspan><tspan fill="#7dd3fc"> notify</tspan><tspan fill="#c7ddf4">(</tspan><tspan fill="#fbbf24">&#8220;&#127881; live&#8221;</tspan><tspan fill="#c7ddf4">, sub);</tspan></text>
      <text x="726" y="422" class="fade" style="animation-delay:3.7s" fill="#c7ddf4">}</text>
      <rect x="736" y="436" width="10" height="19" fill="#34d399" style="animation:blink 1.1s step-end infinite"/>
    </g>
    <!-- status bar -->
    <rect x="700" y="452" width="500" height="28" rx="0" fill="#0c1a30"/>
    <text x="726" y="471" font-size="12.5" fill="#34d399">&#9679; prod</text>
    <text x="790" y="471" font-size="12.5" fill="#8fb3d9">main&#10003; · 0 errors · TypeScript strict</text>
  </g>
</g>

<!-- desk + coffee -->
<g>
  <rect x="690" y="520" width="520" height="10" rx="5" fill="#132542"/>
  <rect x="930" y="530" width="40" height="8" rx="3" fill="#0f2a46"/>
  <!-- mug -->
  <g>
    <rect x="1120" y="486" width="40" height="36" rx="6" fill="#f472b6"/>
    <path d="M1160 494 q18 8 0 20" fill="none" stroke="#f472b6" stroke-width="5"/>
    <path d="M1130 478 q4 -8 0 -14" stroke="#8fb3d9" stroke-width="3" fill="none" style="animation:steam 2.6s ease-out infinite"/>
    <path d="M1144 478 q-4 -8 0 -14" stroke="#8fb3d9" stroke-width="3" fill="none" style="animation:steam 2.6s ease-out infinite;animation-delay:1.2s"/>
  </g>
</g>

<!-- payment rail across the bottom -->
<path id="rail" d="M40 600 H420 L460 566 H840 L880 600 H1240" fill="none" stroke="#1b3357" stroke-width="2.5" stroke-dasharray="10 6" style="animation:dash 2.2s linear infinite"/>
<circle r="6" fill="#34d399" filter="url(#glow)"><animateMotion dur="6s" repeatCount="indefinite"><mpath href="#rail"/></animateMotion></circle>
<circle r="4" fill="#38bdf8" filter="url(#glow)"><animateMotion dur="6s" begin="2s" repeatCount="indefinite"><mpath href="#rail"/></animateMotion></circle>
<circle r="4" fill="#f472b6" filter="url(#glow)"><animateMotion dur="6s" begin="4s" repeatCount="indefinite"><mpath href="#rail"/></animateMotion></circle>
<text x="60" y="628" font-size="13" fill="#33507a">payments in flight &#8594; onboarding &#8594; kyc &#8594; live</text>
</svg>
